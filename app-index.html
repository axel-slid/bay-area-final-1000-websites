<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bay Area Final 1000 Websites</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#111827;line-height:1.5}a{color:inherit}.hero{position:relative;min-height:88vh;color:white;display:flex;flex-direction:column;overflow:hidden}.hero__image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.48) saturate(1.06)}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.68),rgba(0,0,0,.2))}.nav,.hero__content{position:relative;z-index:1}.nav{display:flex;justify-content:space-between;gap:24px;align-items:center;padding:22px clamp(20px,5vw,72px);font-weight:700}.brand{display:flex;align-items:center;gap:12px}.brand-mark{display:inline-grid;place-items:center;width:42px;height:42px;border:1px solid rgba(255,255,255,.55);background:rgba(255,255,255,.14);font-size:14px;font-weight:900}.nav a{text-decoration:none;border:1px solid rgba(255,255,255,.48);padding:10px 14px}.hero__content{max-width:820px;margin:auto 0;padding:80px clamp(20px,5vw,72px)}.eyebrow{text-transform:uppercase;font-size:12px;letter-spacing:0;font-weight:800;color:var(--accent,#d1532f);margin:0 0 12px}.hero .eyebrow{color:white}.hero h1{font-size:clamp(44px,7vw,92px);line-height:.94;margin:0 0 22px;letter-spacing:0}.hero p{max-width:680px;font-size:clamp(18px,2vw,24px)}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}.button{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:12px 18px;background:var(--accent,#d1532f);color:white;text-decoration:none;font-weight:800}.button--ghost{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.5)}main{padding:0 clamp(20px,5vw,72px)}section{max-width:1120px;margin:0 auto;padding:72px 0}.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.2fr);gap:48px;align-items:start}.split h2,.services h2,.proof h2{font-size:clamp(28px,4vw,52px);line-height:1;margin:0}.split p:last-child,.proof p{font-size:19px}.info-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;padding-top:0}.info-grid article,.service-list article{background:white;padding:24px;border:1px solid rgba(0,0,0,.08);box-shadow:0 16px 40px rgba(0,0,0,.05)}.info-grid article{border-top:4px solid var(--accent,#d1532f)}.info-grid span{display:block;color:#64748b;font-size:13px;font-weight:800;text-transform:uppercase}.info-grid strong{display:block;margin-top:8px;font-size:18px}.service-list{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:28px}.service-list h3{margin:0 0 8px;font-size:18px}.service-list p{margin:0;color:#475569}.proof{display:grid;grid-template-columns:1fr auto;gap:28px;align-items:center;border-top:1px solid rgba(0,0,0,.12)}.links{display:flex;flex-direction:column;gap:10px}.links a{font-weight:800;color:var(--primary,#173b2f)}footer{display:flex;justify-content:space-between;gap:20px;padding:28px clamp(20px,5vw,72px);background:var(--primary,#173b2f);color:white}.directory{padding:32px clamp(20px,5vw,72px)}.directory ul{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}.directory a{display:block;min-height:88px;padding:16px;background:white;border:1px solid #e5e7eb;text-decoration:none}.directory span{display:block;margin-top:8px;color:#64748b;font-size:14px}@media(max-width:820px){.split,.proof{grid-template-columns:1fr}.info-grid,.service-list{grid-template-columns:1fr}.hero{min-height:82vh}.nav{align-items:flex-start;flex-direction:column}.hero__content{padding-top:48px}footer{flex-direction:column}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const app = document.getElementById("app");
    const fallback = "https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1800&q=80";
    const pools = {
      restaurant: ["https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1800&q=80"],
      beauty: ["https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1800&q=80"],
      hairdresser: ["https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?auto=format&fit=crop&w=1800&q=80"],
      car_repair: ["https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?auto=format&fit=crop&w=1800&q=80"],
      cafe: ["https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?auto=format&fit=crop&w=1800&q=80"],
      dentist: ["https://images.unsplash.com/photo-1606811971618-4486d14f3f99?auto=format&fit=crop&w=1800&q=80"]
    };
    const palettes = [["#173b2f","#fff8ed","#d1532f","#172016"],["#14213d","#f5f7fb","#fca311","#111827"],["#4b1f36","#fff7fb","#c2687f","#1d1418"],["#164e63","#f0fdfa","#14b8a6","#083344"]];
    function esc(v){return String(v||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}
    function hash(v){let h=0; for(const c of String(v||"")) h=(h*31+c.charCodeAt(0))>>>0; return h}
    function mono(v){return String(v||"B").split(/[^A-Za-z0-9]+/).filter(Boolean).slice(0,2).map(function(p){return p[0].toUpperCase()}).join("")||"B"}
    function services(cat,name){if(/smog/i.test(name))return["Smog checks","Inspection questions","Walk-in timing","Registration support"];return({restaurant:["Lunch and dinner","Takeout","Menu highlights","Group questions"],fast_food:["Quick meals","Takeout","Family orders","Menu questions"],beauty:["Hair and nail services","Appointment calls","Color and styling","Walk-in questions"],hairdresser:["Cuts and styling","Color services","Appointments","Consultation calls"],car_repair:["Diagnostics","Maintenance","Repair estimates","Drop-off questions"],dentist:["Dental appointments","Preventive care","Treatment questions","New patient calls"],cafe:["Coffee and espresso","Breakfast and lunch","Takeout","Local pickup"]}[cat]||["Services","Appointments","Local questions","Phone inquiries"])}
    function renderBusiness(row){
      const h=hash(row.Business+row.Address), pal=palettes[h%palettes.length], imgs=pools[row.Category]||[fallback], img=imgs[h%imgs.length], phoneHref=row.Phone?"tel:"+row.Phone.replace(/[^0-9+]/g,""):"#";
      document.body.style.cssText="--primary:"+pal[0]+";--surface:"+pal[1]+";--accent:"+pal[2]+";--ink:"+pal[3];
      document.title=row.Business+" | "+row.Category;
      const serviceHtml=services(row.Category,row.Business).map(function(s){return '<article><h3>'+esc(s)+'</h3><p>Clear, phone-friendly information for customers comparing local options.</p></article>'}).join("");
      app.innerHTML='<header class="hero"><img class="hero__image" src="'+img+'" alt=""><nav class="nav"><span class="brand"><span class="brand-mark">'+esc(mono(row.Business))+'</span>'+esc(row.Business)+'</span><a href="'+phoneHref+'">'+esc(row.Phone||"Call")+'</a></nav><div class="hero__content"><p class="eyebrow">'+esc((row.Category||"business").replace(/_/g," "))+'</p><h1>'+esc(row.Business)+'</h1><p>'+esc(row["Why a dedicated website would help"])+'</p><div class="actions"><a class="button" href="'+phoneHref+'">Call '+esc(row.Phone||"now")+'</a>'+(row["Google Maps link"]?'<a class="button button--ghost" href="'+esc(row["Google Maps link"])+'">Open map</a>':"")+(row["Yelp or booking link"]?'<a class="button button--ghost" href="'+esc(row["Yelp or booking link"])+'">See profile photos</a>':"")+'</div></div></header><main><section class="split"><div><p class="eyebrow">Why this page exists</p><h2>Everything customers need before reaching out.</h2></div><p>'+esc(row["Why a dedicated website would help"])+'</p></section><section class="info-grid"><article><span>Address</span><strong>'+esc(row.Address)+'</strong></article><article><span>Hours</span><strong>'+esc(row.Hours||"Call for current hours")+'</strong></article><article><span>Phone</span><strong>'+esc(row.Phone)+'</strong></article></section><section class="services"><p class="eyebrow">Services</p><h2>Built around real search intent.</h2><div class="service-list">'+serviceHtml+'</div></section><section class="proof"><div><p class="eyebrow">Lead notes</p><h2>No owned website confirmed.</h2><p>'+esc(row["Website status"])+'</p></div><div class="links">'+(row["Yelp or booking link"]?'<a href="'+esc(row["Yelp or booking link"])+'">Yelp or booking profile and photos</a>':"")+(row["Google Maps link"]?'<a href="'+esc(row["Google Maps link"])+'">Google Maps search</a>':"")+'</div></section></main><footer><span>'+esc(row.Business)+'</span><span>Draft local website generated from public lead data.</span></footer>';
    }
    function renderDirectory(rows){app.innerHTML='<header style="padding:48px clamp(20px,5vw,72px);background:#111827;color:white"><h1>Bay Area Final 1000 Websites</h1><p>Static bundle of 1000 generated local-business websites.</p></header><main class="directory"><ul>'+rows.map(function(r){return '<li><a href="/'+esc(r.slug)+'/"><strong>'+esc(r.Business)+'</strong><span>'+esc(r.Category)+' · Stop '+esc(r["Route stop"])+'</span></a></li>'}).join("")+'</ul></main>'}
    fetch("/data.json").then(function(r){return r.json()}).then(function(rows){const slug=location.pathname.replace(/^\/+|\/+$/g,""); if(!slug)return renderDirectory(rows); const row=rows.find(function(r){return r.slug===slug}); if(row)return renderBusiness(row); document.title="Not found"; app.innerHTML='<main class="directory"><h1>Not found</h1><p>This business is not in the active final 1000.</p><p><a href="/">Back to index</a></p></main>';});
  </script>
</body>
</html>
