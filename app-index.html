<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bay Area Final 1000 Websites</title>
    <style>
      *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--surface,#f8fafc);color:var(--ink,#111827);line-height:1.5}a{color:inherit}.hero{position:relative;min-height:82vh;display:flex;flex-direction:column;background:var(--primary,#173b2f);color:white;overflow:hidden}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.72),rgba(0,0,0,.28)),linear-gradient(0deg,rgba(0,0,0,.36),transparent 44%)}.hero__image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.64) saturate(1.08)}.nav,.hero-main{position:relative;z-index:1}.nav{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:22px clamp(18px,5vw,72px);font-weight:800}.brand{display:flex;align-items:center;gap:12px}.mark{display:grid;place-items:center;width:42px;height:42px;border:1px solid rgba(255,255,255,.55);background:rgba(255,255,255,.12)}.nav a,.button{min-height:44px;display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;text-decoration:none;border:1px solid rgba(255,255,255,.55);font-weight:800}.hero-main{margin:auto 0;padding:64px clamp(18px,5vw,72px);max-width:920px}.eyebrow{text-transform:uppercase;font-size:12px;font-weight:900;margin:0 0 12px;color:var(--accent,#d1532f)}.hero .eyebrow{color:#f8fafc}.hero h1{font-size:clamp(42px,7vw,88px);line-height:.95;margin:0 0 20px;letter-spacing:0}.hero p{font-size:clamp(18px,2vw,24px);max-width:760px}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}.button{background:var(--accent,#d1532f);color:white;border-color:var(--accent,#d1532f)}.button.secondary{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.55)}main{padding:0 clamp(18px,5vw,72px)}section{max-width:1120px;margin:0 auto;padding:64px 0}.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.3fr);gap:42px;align-items:start}.split h2,.services h2{font-size:clamp(28px,4vw,50px);line-height:1;margin:0}.split p:last-child{font-size:19px}.info{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.info article,.service-list article{background:white;border:1px solid #e5e7eb;padding:22px}.info article{border-top:4px solid var(--accent,#d1532f)}.info span{display:block;color:#64748b;font-size:13px;font-weight:900;text-transform:uppercase}.info strong{display:block;margin-top:8px;font-size:18px}.service-list{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:24px}.service-list h3{margin:0 0 8px;font-size:18px}.service-list p{margin:0;color:#475569}.directory{padding:32px clamp(18px,5vw,72px)}.directory ul{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}.directory a{display:block;min-height:88px;padding:16px;background:white;border:1px solid #e5e7eb;text-decoration:none}.directory span{display:block;margin-top:8px;color:#64748b;font-size:14px}footer{display:flex;justify-content:space-between;gap:18px;padding:28px clamp(18px,5vw,72px);background:var(--primary,#111827);color:white}@media(max-width:820px){.split,.info,.service-list{grid-template-columns:1fr}.nav,footer{align-items:flex-start;flex-direction:column}}
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const serviceMap={restaurant:["Menu highlights","Takeout details","Hours and location","Group questions"],fast_food:["Quick meals","Pickup details","Menu questions","Family orders"],beauty:["Salon services","Appointments","Walk-in questions","Style details"],hairdresser:["Cuts and styling","Color services","Consultations","Appointment calls"],car_repair:["Diagnostics","Maintenance","Repair estimates","Drop-off questions"],dentist:["Appointments","Preventive care","Treatment questions","New patient calls"],cafe:["Coffee and espresso","Breakfast and lunch","Pickup details","Daily questions"],laundry:["Wash and fold","Dry cleaning questions","Turnaround timing","Drop-off details"],tailor:["Alterations","Repair questions","Fitting timing","Pickup details"],jewelry:["Repair questions","Custom work","Store hours","Appointment calls"]};
      const imagePool={restaurant:["https://images.unsplash.com/photo-1552566626-52f8b828add9?auto=format&fit=crop&w=1800&q=80","https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1800&q=80"],fast_food:["https://images.unsplash.com/photo-1561758033-d89a9ad46330?auto=format&fit=crop&w=1800&q=80"],cafe:["https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1800&q=80","https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?auto=format&fit=crop&w=1800&q=80"],beauty:["https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1800&q=80","https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1800&q=80"],hairdresser:["https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?auto=format&fit=crop&w=1800&q=80","https://images.unsplash.com/photo-1562322140-8baeececf3df?auto=format&fit=crop&w=1800&q=80"],car_repair:["https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?auto=format&fit=crop&w=1800&q=80","https://images.unsplash.com/photo-1625047509168-a7026f36de04?auto=format&fit=crop&w=1800&q=80"],dentist:["https://images.unsplash.com/photo-1606811971618-4486d14f3f99?auto=format&fit=crop&w=1800&q=80"],bakery:["https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=1800&q=80"],laundry:["https://images.unsplash.com/photo-1517677208171-0bc6725a3e60?auto=format&fit=crop&w=1800&q=80"],clothes:["https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1800&q=80"],jewelry:["https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&w=1800&q=80"],tailor:["https://images.unsplash.com/photo-1558618666-fcd25c85cd64?auto=format&fit=crop&w=1800&q=80"]};
      const palettes=[["#173b2f","#f8fafc","#d1532f","#172016"],["#14213d","#f5f7fb","#fca311","#111827"],["#4b1f36","#fff7fb","#c2687f","#1d1418"],["#164e63","#f0fdfa","#14b8a6","#083344"],["#2f3e46","#f6f7f4","#b85c38","#202522"]];
      const fallback="https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1800&q=80";
      function esc(v){return String(v||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
      function hash(v){let h=0;for(const c of String(v||""))h=(h*31+c.charCodeAt(0))>>>0;return h}
      function heroImage(row){const pool=imagePool[row.Category]||[fallback];return pool[hash(row.Business+row.Address)%pool.length]}
      function applyPalette(row){const p=palettes[hash(row.Business+row.Category)%palettes.length];document.body.style.cssText=`--primary:${p[0]};--surface:${p[1]};--accent:${p[2]};--ink:${p[3]}`}
      function initials(v){return String(v||"B").split(/[^A-Za-z0-9]+/).filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join("")||"B"}
      function phoneHref(v){return v?"tel:"+String(v).replace(/[^0-9+]/g,""):"#"}
      function services(row){return serviceMap[row.Category]||["Services","Appointments","Local questions","Phone inquiries"]}
      function renderBusiness(row){applyPalette(row);document.title=row.Business+" | Local website draft";app.innerHTML=`<header class="hero"><img class="hero__image" src="${heroImage(row)}" alt=""><nav class="nav"><span class="brand"><span class="mark">${esc(initials(row.Business))}</span>${esc(row.Business)}</span><a href="${phoneHref(row.Phone)}">${esc(row.Phone||"Call")}</a></nav><div class="hero-main"><p class="eyebrow">${esc((row.Category||"business").replace(/_/g," "))}</p><h1>${esc(row.Business)}</h1><p>${esc(row["Why a dedicated website would help"])}</p><div class="actions"><a class="button" href="${phoneHref(row.Phone)}">Call ${esc(row.Phone||"now")}</a>${row["Google Maps link"]?`<a class="button secondary" href="${esc(row["Google Maps link"])}">Open map</a>`:""}${row["Yelp or booking link"]?`<a class="button secondary" href="${esc(row["Yelp or booking link"])}">Profile photos</a>`:""}</div></div></header><main><section class="split"><div><p class="eyebrow">Lead note</p><h2>No owned website confirmed in audit.</h2></div><p>${esc(row["Website status"])}</p></section><section class="info"><article><span>Address</span><strong>${esc(row.Address)}</strong></article><article><span>Hours</span><strong>${esc(row.Hours||"Call for current hours")}</strong></article><article><span>Phone</span><strong>${esc(row.Phone)}</strong></article></section><section class="services"><p class="eyebrow">Services</p><h2>Information customers usually need first.</h2><div class="service-list">${services(row).map(item=>`<article><h3>${esc(item)}</h3><p>Clear, phone-friendly details for customers comparing local options.</p></article>`).join("")}</div></section></main><footer><span>${esc(row.Business)}</span><span>Generated local website draft from public lead data.</span></footer>`}
      function renderDirectory(rows){document.body.style.cssText="";document.title="Bay Area Final 1000 Websites";app.innerHTML=`<header class="hero"><img class="hero__image" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=80" alt=""><div class="hero-main"><p class="eyebrow">Verified lead bundle</p><h1>Bay Area Final 1000 Websites</h1><p>Generated local-business site drafts for the active final 1000 CSV.</p></div></header><main class="directory"><ul>${rows.map(row=>`<li><a href="/${esc(row.slug)}/"><strong>${esc(row.Business)}</strong><span>${esc(row.Category)} · Stop ${esc(row["Route stop"])}</span></a></li>`).join("")}</ul></main>`}
      fetch("/data.json").then(r=>r.json()).then(rows=>{const slug=location.pathname.replace(/^\/+|\/+$/g,"");if(!slug)return renderDirectory(rows);const row=rows.find(item=>item.slug===slug);if(row)return renderBusiness(row);document.title="Not found";app.innerHTML='<main class="directory"><h1>Not found</h1><p>This business is not in the active final 1000.</p><p><a href="/">Back to index</a></p></main>'});
    </script>
  </body>
</html>
