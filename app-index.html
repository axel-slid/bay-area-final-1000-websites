<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bay Area Final 1000 Websites</title>
    <style>
      *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#111827;line-height:1.5}a{color:inherit}.hero{min-height:82vh;display:flex;flex-direction:column;background:#173b2f;color:white}.nav{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:22px clamp(18px,5vw,72px);font-weight:800}.brand{display:flex;align-items:center;gap:12px}.mark{display:grid;place-items:center;width:42px;height:42px;border:1px solid rgba(255,255,255,.55);background:rgba(255,255,255,.12)}.nav a,.button{min-height:44px;display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;text-decoration:none;border:1px solid rgba(255,255,255,.55);font-weight:800}.hero-main{margin:auto 0;padding:64px clamp(18px,5vw,72px);max-width:920px}.eyebrow{text-transform:uppercase;font-size:12px;font-weight:900;margin:0 0 12px;color:#d1532f}.hero .eyebrow{color:#f8fafc}.hero h1{font-size:clamp(42px,7vw,88px);line-height:.95;margin:0 0 20px;letter-spacing:0}.hero p{font-size:clamp(18px,2vw,24px);max-width:760px}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}.button{background:#d1532f;color:white;border-color:#d1532f}.button.secondary{background:transparent;border-color:rgba(255,255,255,.55)}main{padding:0 clamp(18px,5vw,72px)}section{max-width:1120px;margin:0 auto;padding:64px 0}.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.3fr);gap:42px;align-items:start}.split h2,.services h2{font-size:clamp(28px,4vw,50px);line-height:1;margin:0}.split p:last-child{font-size:19px}.info{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.info article,.service-list article{background:white;border:1px solid #e5e7eb;padding:22px}.info span{display:block;color:#64748b;font-size:13px;font-weight:900;text-transform:uppercase}.info strong{display:block;margin-top:8px;font-size:18px}.service-list{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:24px}.service-list h3{margin:0 0 8px;font-size:18px}.service-list p{margin:0;color:#475569}.directory{padding:32px clamp(18px,5vw,72px)}.directory ul{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}.directory a{display:block;min-height:88px;padding:16px;background:white;border:1px solid #e5e7eb;text-decoration:none}.directory span{display:block;margin-top:8px;color:#64748b;font-size:14px}footer{display:flex;justify-content:space-between;gap:18px;padding:28px clamp(18px,5vw,72px);background:#111827;color:white}@media(max-width:820px){.split,.info,.service-list{grid-template-columns:1fr}.nav,footer{align-items:flex-start;flex-direction:column}}
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const serviceMap={restaurant:["Menu highlights","Takeout details","Hours and location","Group questions"],fast_food:["Quick meals","Pickup details","Menu questions","Family orders"],beauty:["Salon services","Appointments","Walk-in questions","Style details"],hairdresser:["Cuts and styling","Color services","Consultations","Appointment calls"],car_repair:["Diagnostics","Maintenance","Repair estimates","Drop-off questions"],dentist:["Appointments","Preventive care","Treatment questions","New patient calls"],cafe:["Coffee and espresso","Breakfast and lunch","Pickup details","Daily questions"]};
      function esc(v){return String(v||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
      function initials(v){return String(v||"B").split(/[^A-Za-z0-9]+/).filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join("")||"B"}
      function phoneHref(v){return v?"tel:"+String(v).replace(/[^0-9+]/g,""):"#"}
      function services(row){return serviceMap[row.Category]||["Services","Appointments","Local questions","Phone inquiries"]}
      function renderBusiness(row){document.title=row.Business+" | Local website draft";app.innerHTML=`<header class="hero"><nav class="nav"><span class="brand"><span class="mark">${esc(initials(row.Business))}</span>${esc(row.Business)}</span><a href="${phoneHref(row.Phone)}">${esc(row.Phone||"Call")}</a></nav><div class="hero-main"><p class="eyebrow">${esc((row.Category||"business").replace(/_/g," "))}</p><h1>${esc(row.Business)}</h1><p>${esc(row["Why a dedicated website would help"])}</p><div class="actions"><a class="button" href="${phoneHref(row.Phone)}">Call ${esc(row.Phone||"now")}</a>${row["Google Maps link"]?`<a class="button secondary" href="${esc(row["Google Maps link"])}">Open map</a>`:""}${row["Yelp or booking link"]?`<a class="button secondary" href="${esc(row["Yelp or booking link"])}">Profile photos</a>`:""}</div></div></header><main><section class="split"><div><p class="eyebrow">Lead note</p><h2>No owned website confirmed in audit.</h2></div><p>${esc(row["Website status"])}</p></section><section class="info"><article><span>Address</span><strong>${esc(row.Address)}</strong></article><article><span>Hours</span><strong>${esc(row.Hours||"Call for current hours")}</strong></article><article><span>Phone</span><strong>${esc(row.Phone)}</strong></article></section><section class="services"><p class="eyebrow">Services</p><h2>Information customers usually need first.</h2><div class="service-list">${services(row).map(item=>`<article><h3>${esc(item)}</h3><p>Clear, phone-friendly details for customers comparing local options.</p></article>`).join("")}</div></section></main><footer><span>${esc(row.Business)}</span><span>Generated local website draft from public lead data.</span></footer>`}
      function renderDirectory(rows){document.title="Bay Area Final 1000 Websites";app.innerHTML=`<header class="hero"><div class="hero-main"><p class="eyebrow">Verified lead bundle</p><h1>Bay Area Final 1000 Websites</h1><p>Generated local-business site drafts for the active final 1000 CSV.</p></div></header><main class="directory"><ul>${rows.map(row=>`<li><a href="/${esc(row.slug)}/"><strong>${esc(row.Business)}</strong><span>${esc(row.Category)} · Stop ${esc(row["Route stop"])}</span></a></li>`).join("")}</ul></main>`}
      fetch("/data.json").then(r=>r.json()).then(rows=>{const slug=location.pathname.replace(/^\/+|\/+$/g,"");if(!slug)return renderDirectory(rows);const row=rows.find(item=>item.slug===slug);if(row)return renderBusiness(row);document.title="Not found";app.innerHTML='<main class="directory"><h1>Not found</h1><p>This business is not in the active final 1000.</p><p><a href="/">Back to index</a></p></main>'});
    </script>
  </body>
</html>
